<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Welcome Screen -->
    <div id="nameSection" class="welcome-screen">
        <h1>📝 To-Do App</h1>

        <p>Welcome! Please enter your name to continue.</p>

        <input
            type="text"
            id="nameInput"
            placeholder="Enter your name"
        >

        <button id="saveNameBtn">Start</button>
    </div>

    <!-- Main App -->
    <div class="container" id="todoContainer">

        <h1>📝 To-Do App</h1>

        <h2 id="welcome"></h2>

        <div class="user-actions">
        <button id="clearAllBtn">Clear All</button>
        <button id="resetAppBtn">Reset App</button>
    
        </div>

        <div class="input-section">
            <input
                type="text"
                id="taskInput"
                placeholder="Enter a task..."
            >

            <button id="addBtn">Add</button>
        </div>

        <p id="taskCount"></p>

        <ul id="taskList"></ul>

    </div>

    <script src="app.js"></script>

</body>
</html>
